<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Infrequent Voter Lookup</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header class="site-header">
      <h1>Infrequent Voter Lookup</h1>
      <p class="lede">Select one or more counties, load the voter list, then search, filter, and download results.</p>
    </header>

    <section class="panel">
      <h2>1. Select counties</h2>
      <div class="county-actions">
        <button id="selectAllCounties" type="button">Select all shown</button>
        <button id="clearCounties" type="button">Clear counties</button>
        <button id="loadCounties" type="button" class="primary">Load selected counties</button>
      </div>
      <input id="countySearch" type="search" placeholder="Filter county list..." aria-label="Filter county list" />
      <div id="countyList" class="county-list" aria-live="polite"></div>
      <p id="loadStatus" class="status">County list loading...</p>
    </section>

    <section class="panel controls-panel">
      <h2>2. Search and filter loaded voters</h2>
      <div class="controls-grid">
        <label>
          Search
          <input id="globalSearch" type="search" placeholder="Name, address, NCID, county, precinct..." disabled />
        </label>
        <label>
          Status
          <select id="statusFilter" disabled>
            <option value="">All statuses</option>
          </select>
        </label>
        <label>
          Precinct
          <select id="precinctFilter" disabled>
            <option value="">All precincts</option>
          </select>
        </label>
      </div>
      <div class="download-row">
        <button id="downloadLoaded" type="button" disabled>Download Full Loaded Voter List</button>
        <button id="downloadFiltered" type="button" disabled>Download Selected Voter List</button>
      </div>
    </section>

    <section class="panel results-panel">
      <div class="results-header">
        <h2>Results</h2>
        <p id="resultCount" class="status">No counties loaded.</p>
      </div>
      <div class="table-wrap">
        <table id="resultsTable">
          <thead>
            <tr>
              <th>County</th>
              <th>Name</th>
              <th>Residential Address</th>
              <th>Precinct</th>
              <th>Status</th>
              <th>NCID</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="pagination">
        <button id="prevPage" type="button" disabled>Previous</button>
        <span id="pageInfo">Page 0 of 0</span>
        <button id="nextPage" type="button" disabled>Next</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
