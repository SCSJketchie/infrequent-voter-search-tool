<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Infrequent Voter Lookup</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header>
      <p class="eyebrow">Prototype</p>
      <h1>Infrequent Voter Lookup</h1>
      <p class="lede">Search by name, address, NCID, county, precinct, or voter status.</p>
    </header>

    <section class="controls" aria-label="Search and filters">
      <label>
        Search
        <input id="searchInput" type="search" placeholder="Try: Smith, Bryson City, EC12345..." />
      </label>

      <label>
        County
        <select id="countyFilter">
          <option value="">All counties</option>
        </select>
      </label>

      <label>
        Status
        <select id="statusFilter">
          <option value="">All statuses</option>
        </select>
      </label>

      <label>
        Precinct
        <select id="precinctFilter">
          <option value="">All precincts</option>
        </select>
      </label>

      <button id="clearFilters" type="button">Clear</button>
    </section>

    <section class="summary" aria-live="polite">
      <span id="resultCount">Loading data…</span>
      <div class="download-links" aria-label="Download options">
        <a href="data/infrequent-voters.csv" download>Download Full Voter List</a>
        <a id="downloadFiltered" href="#" download="selected-voter-list.csv">Download Selected Voter List</a>
      </div>
    </section>

    <p id="displayNote" class="display-note"></p>

    <div class="table-wrap">
      <table id="resultsTable">
        <thead>
          <tr>
            <th>County</th>
            <th>Full Name</th>
            <th>Residential Address</th>
            <th>Precinct</th>
            <th>Voter Status</th>
            <th>NCID</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
